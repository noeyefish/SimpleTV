<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ערוצי טלוויזיה</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #0a0c10;
      --bg-sidebar: rgba(15, 20, 28, 0.85);
      --text-main: #ffffff;
      --text-muted: #8b949e;
      --accent: #3b82f6; /* Modern Blue */
      --accent-glow: rgba(59, 130, 246, 0.4);
      --card-bg: rgba(22, 27, 34, 0.6);
      --card-hover: rgba(33, 40, 48, 0.9);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body, html {
      width: 100%;
      height: 100%;
      font-family: 'Heebo', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      overflow: hidden;
    }

    /* Animated Dynamic Background */
    .bg-animated {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: radial-gradient(circle at 10% 80%, rgba(59, 130, 246, 0.1), transparent 45%),
                  radial-gradient(circle at 90% 20%, rgba(99, 102, 241, 0.1), transparent 45%);
      z-index: 0;
      pointer-events: none;
    }

    .app-container {
      display: flex;
      width: 100%;
      height: 100%;
      position: relative;
      z-index: 1;
    }

    /* Sidebar (First in DOM, Right side due to RTL direction) */
    .sidebar {
      width: 320px;
      flex-shrink: 0;
      background-color: var(--bg-sidebar);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-left: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      box-shadow: -10px 0 30px rgba(0,0,0,0.6);
      z-index: 10;
    }

    .sidebar-header {
      padding: 35px 24px 25px;
      border-bottom: 1px solid var(--glass-border);
      text-align: right;
    }

    .sidebar-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 6px;
      letter-spacing: -0.5px;
      text-shadow: 0 0 20px rgba(255,255,255,0.1);
    }

    .sidebar-header p {
      color: var(--text-muted);
      font-size: 1rem;
      font-weight: 400;
    }

    .channel-list {
      flex: 1;
      padding: 24px 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255,255,255,0.25);
    }

    .channel-btn {
      background-color: var(--card-bg);
      border: 1px solid var(--glass-border);
      padding: 18px 20px;
      border-radius: 16px;
      color: var(--text-main);
      font-size: 1.15rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .channel-btn::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.05), transparent);
      transform: translateX(100%);
      transition: transform 0.6s;
    }

    .channel-btn:hover {
      background-color: var(--card-hover);
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
      border-color: rgba(255,255,255,0.15);
    }

    .channel-btn:hover::before {
      transform: translateX(-100%);
    }

    .channel-btn.active {
      background-color: rgba(59, 130, 246, 0.15);
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent), 0 10px 24px rgba(0,0,0,0.5);
    }

    .channel-btn .icon-wrapper {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .channel-btn .icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      transition: all 0.3s ease;
    }

    .channel-btn .icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 6px;
    }

    .channel-btn.active .icon {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .live-badge {
      font-size: 0.75rem;
      background: #e55353;
      color: white;
      padding: 3px 8px;
      border-radius: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
      opacity: 0;
      transform: scale(0.8);
      transition: all 0.3s ease;
    }

    .channel-btn.active .live-badge {
      opacity: 1;
      transform: scale(1);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(229, 83, 83, 0.7); }
      70% { box-shadow: 0 0 0 6px rgba(229, 83, 83, 0); }
      100% { box-shadow: 0 0 0 0 rgba(229, 83, 83, 0); }
    }

    /* Main Content (Left side in RTL) */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 30px;
      min-width: 0; /* Important for flex children with video */
    }

    .player-header {
      margin-bottom: 24px;
      height: 46px; /* fixed height layout */
      display: flex;
      align-items: center;
    }

    .player-header h2 {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }

    .video-wrapper {
      flex: 1;
      background: #000;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--glass-shadow);
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .video-wrapper::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
      border-radius: 24px;
      pointer-events: none;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    .empty-state {
      color: var(--text-muted);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      animation: fadeIn 0.8s ease;
    }

    .empty-state .icon-box {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(255,255,255,0.03);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
      box-shadow: inset 0 4px 20px rgba(0,0,0,0.3);
    }

    .empty-state svg {
      width: 48px;
      height: 48px;
      opacity: 0.6;
    }

    .empty-state h3 {
      font-size: 1.8rem;
      color: #fff;
      font-weight: 600;
    }

    .empty-state p {
      font-size: 1.1rem;
      max-width: 320px;
      line-height: 1.5;
      color: var(--text-muted);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Loader */
    .loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-left-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      display: none;
      z-index: 5;
    }

    @keyframes spin {
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* Mobile Responsive Support */
    @media (max-width: 768px) {
      .app-container {
        flex-direction: column-reverse;
      }
      .sidebar {
        width: 100%;
        height: 45vh;
        border-left: none;
        border-top: 1px solid var(--glass-border);
        box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
      }
      .sidebar-header {
        padding: 20px 20px 15px;
      }
      .sidebar-header h1 {
        font-size: 1.5rem;
      }
      .channel-list {
        padding: 10px 20px 20px;
        gap: 12px;
      }
      .main-content {
        height: 55vh;
        padding: 15px;
      }
      .player-header {
        margin-bottom: 12px;
        height: 36px;
      }
      .player-header h2 {
        font-size: 1.4rem;
      }
      .video-wrapper, .video-wrapper::after {
        border-radius: 16px;
      }
      .empty-state h3 {
        font-size: 1.4rem;
      }
      .empty-state p {
        font-size: 0.95rem;
      }
      .empty-state .icon-box {
        width: 70px;
        height: 70px;
      }
      .empty-state svg {
        width: 32px;
        height: 32px;
      }
    }
  </style>
</head>
<body>

  <div class="bg-animated"></div>

  <div class="app-container">
    
    <!-- Sidebar (Right) -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h1>ערוצי ישראל</h1>
        <p>בחר ערוץ מהרשימה</p>
      </div>
      <div class="channel-list" id="channelList">
        <!-- Buttons will be generated here -->
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <div class="player-header">
        <h2 id="currentChannelTitle"></h2>
      </div>
      <div class="video-wrapper" id="videoWrapper">
        <div class="empty-state" id="emptyState">
          <div class="icon-box">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
            </svg>
          </div>
          <h3>מתחם הצפייה מוכן</h3>
          <p>בחר ערוץ מהתפריט בצד ימין כדי להתחיל בצפייה ישירה באיכות גבוהה.</p>
        </div>
        <div class="loader" id="loader"></div>
        <video id="player" controls autoplay playsinline style="display: none;"></video>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    const channels = [
      { title: 'ערוץ 11', url: 'https://kancdn.medonecdn.net/livehls/oil/kancdn-live/live/kan11/live.livx/playlist.m3u8', logo: 'https://raw.githubusercontent.com/RokuIL/Live-From-Israel/master/Logos/Kan%2011.png' },
      { title: 'קשת 12', url: 'https://mako-streaming.akamaized.net/stream/hls/live/2033791/k12dvr/index.m3u8', logo: 'https://raw.githubusercontent.com/RokuIL/Live-From-Israel/master/Logos/Keshet%2012.png' },
      { title: 'רשת 13', url: 'https://dsk76kvc9kie6.cloudfront.net/out/v1/2f2bc414a3db4698a8e94b89eaf2da2a/index_5.m3u8', logo: 'https://raw.githubusercontent.com/RokuIL/Live-From-Israel/master/Logos/Reshet%2013.jpg' },
      { title: 'ערוץ 14', url: 'https://r.il.cdn-redge.media/livehls/oil/ch14/live/ch14/live.livx/playlist.m3u8', logo: 'https://www.c14.co.il/static/icons/c14.png' }
    ];

    const channelList = document.getElementById('channelList');
    const video = document.getElementById('player');
    const emptyState = document.getElementById('emptyState');
    const loader = document.getElementById('loader');
    const currentChannelTitle = document.getElementById('currentChannelTitle');
    let hls = null;

    // Create buttons dynamically
    channels.forEach((channel) => {
      const btn = document.createElement('button');
      btn.className = 'channel-btn';
      
      btn.innerHTML = `
        <div class="icon-wrapper">
          <div class="icon">
            <img src="${channel.logo}" alt="${channel.title}" />
          </div>
          <span>${channel.title}</span>
        </div>
        <span class="live-badge">LIVE</span>
      `;
      
      btn.onclick = () => playChannel(channel, btn);
      channelList.appendChild(btn);
    });

    function playChannel(channel, buttonElement) {
      // Toggle active states
      document.querySelectorAll('.channel-btn').forEach(btn => btn.classList.remove('active'));
      if (buttonElement) buttonElement.classList.add('active');

      // Update UI
      currentChannelTitle.textContent = channel.title;
      emptyState.style.display = 'none';
      video.style.display = 'block';
      loader.style.display = 'block';

      // Destroy old instance if exists
      if (hls) {
        hls.destroy();
        hls = null;
      }
      
      // Reset native video to clear old resources
      video.pause();
      video.removeAttribute('src');
      video.load();

      // Load new stream using HLS.js
      if (Hls.isSupported()) {
        hls = new Hls({ enableWorker: true, lowLatencyMode: true });
        hls.loadSource(channel.url);
        hls.attachMedia(video);
        
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          loader.style.display = 'none';
          video.play().catch(e => console.error("Playback failed:", e));
        });
        
        hls.on(Hls.Events.ERROR, function (event, data) {
          if (data.fatal) {
            console.error("HLS fatal error:", data);
            switch (data.type) {
              case Hls.ErrorTypes.NETWORK_ERROR:
                hls.startLoad();
                break;
              case Hls.ErrorTypes.MEDIA_ERROR:
                hls.recoverMediaError();
                break;
              default:
                hls.destroy();
                loader.style.display = 'none';
                break;
            }
          }
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        // Fallback for Safari natively supporting HLS
        video.src = channel.url;
        video.onloadedmetadata = () => {
          loader.style.display = 'none';
          video.play().catch(e => console.error("Playback failed:", e));
        };
        video.onerror = (e) => {
          console.error("Native playback error:", e);
          loader.style.display = 'none';
        };
      }
    }
  </script>
</body>
</html>
